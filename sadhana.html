<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0D0806">
  <title>Sadhana Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <link rel="stylesheet" href="sadhana-styles.css">
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <p class="loading-text">Loading…</p>
</div>

<!-- Login -->
<div class="login-screen" id="loginScreen" style="display:none">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-icon">🙏</div>
      <h1 class="login-title">Sadhana Support</h1>
      <p class="login-subtitle">Track your daily spiritual practices</p>
    </div>
    <button class="google-btn" id="googleSignIn">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Continue with Google
    </button>
  </div>
</div>

<!-- App -->
<div class="app-screen" id="appScreen" style="display:none">

  <!-- Header -->
  <header class="app-header">
    <div class="header-brand">
      <span class="brand-icon">🙏</span>
      <span class="brand-name">Sadhana Support</span>
    </div>
    <div class="date-nav">
      <button class="date-arrow" id="prevDay" aria-label="Previous day">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="date-center">
        <div class="date-label" id="dateLabel">Today</div>
        <div class="date-full" id="dateFull"></div>
      </div>
      <button class="date-arrow" id="nextDay" aria-label="Next day">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <button class="user-btn" id="userBtn" title="Account">
      <img class="user-avatar" id="userPhoto" src="" alt="">
    </button>
  </header>

  <!-- User dropdown -->
  <div class="user-dropdown" id="userDropdown" style="display:none">
    <div class="user-dropdown-info">
      <span class="user-dropdown-name" id="userName"></span>
      <span class="user-dropdown-email" id="userEmail"></span>
    </div>
    <div class="user-dropdown-divider"></div>
    <button class="signout-btn" id="signOutBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign out
    </button>
  </div>

  <!-- Main -->
  <main class="main-content">

    <!-- 90-Day Trends -->
    <div class="trends-card">
      <div class="trends-header">
        <span class="trends-title">90-Day Trends</span>
        <span class="trends-subtitle">last 90 days per practice</span>
      </div>
      <div class="heatmap-grid" id="heatmapSadhana"></div>
      <div class="trend-habits" id="trendHabits"></div>
    </div>

    <!-- Today's Practices -->
    <div class="sadhana-card">
      <div class="card-header">
        <div class="card-title-group">
          <span class="card-emoji">🙏</span>
          <h2 class="card-title">Today's Practices</h2>
        </div>
        <div class="progress-ring-wrap">
          <svg viewBox="0 0 36 36">
            <circle class="ring-bg" cx="18" cy="18" r="15.9"/>
            <circle class="ring-fill" id="sadhanaRing" cx="18" cy="18" r="15.9" stroke-dasharray="0 100"/>
          </svg>
          <span class="ring-pct" id="sadhanaPct">0%</span>
        </div>
      </div>
      <div class="card-body">
        <div class="practice-list" id="practiceList"></div>
        <div class="completion-banner" id="completionBanner" style="display:none">
          ✨ All practices complete today!
        </div>
      </div>
    </div>

  </main>
</div>

<script src="sadhana.js"></script>
</body>
</html>
